name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: only what actions/deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once, but let a newer commit finish rather than
# cancelling it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@v5
        id: pages

      - name: Build web
        working-directory: apps/web
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          GIT_COMMIT: ${{ github.sha }}
          APP_ENV: production
          # Public write-only ingest key, so a repo variable rather than a secret.
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_APP_ENV: production
        run: |
          set -euo pipefail
          # Fail loudly rather than shipping a build that silently reports nothing.
          # Sentry disables itself on an empty DSN, which would look identical to
          # "no errors happening" — the exact failure this issue exists to prevent.
          if [ -z "${VITE_SENTRY_DSN:-}" ]; then
            echo "VITE_SENTRY_DSN is empty; refusing to deploy an uninstrumented build." >&2
            echo "Set it with: gh variable set VITE_SENTRY_DSN --body '<dsn>'" >&2
            exit 1
          fi
          export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pnpm build

      # A bundle without its .map is a minified stack trace nobody can read.
      - name: Verify source maps were emitted
        working-directory: apps/web
        run: |
          set -euo pipefail
          count="$(find dist/assets -name '*.js.map' | wc -l | tr -d ' ')"
          if [ "$count" -eq 0 ]; then
            echo "No source maps in dist/assets; Sentry stack traces would be unreadable." >&2
            exit 1
          fi
          echo "OK: $count source map(s) emitted"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

      # Proves the URL serves THIS commit, not a stale cached build.
      - name: Smoke test deployed health endpoint
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          url="${PAGE_URL%/}/health.json"
          for attempt in $(seq 1 10); do
            body="$(curl -fsS --max-time 15 "$url" || true)"
            got="$(printf '%s' "$body" | jq -r '.commit // empty')"
            if [ "$got" = "$EXPECTED_SHA" ]; then
              echo "OK: $url reports commit $got"
              exit 0
            fi
            echo "attempt $attempt: got '${got:-<none>}', want '$EXPECTED_SHA'; retrying..."
            sleep 15
          done
          echo "FAILED: $url never reported commit $EXPECTED_SHA"
          exit 1

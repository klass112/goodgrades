name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Same shape as the Pages deploy: never two at once, and never cancel a deploy
# mid-publish just because a newer commit landed.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Cloudflare account is a CEO action (KLA-9). Until the secret exists
      # this job reports a clear skip rather than a red X, because a missing
      # credential we are knowingly waiting on is not a broken build. It turns
      # into a real deploy the moment the secret is added — no code change.
      - name: Check for Cloudflare credentials
        id: creds
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### API deploy skipped"
              echo
              echo "\`CLOUDFLARE_API_TOKEN\` and/or \`CLOUDFLARE_ACCOUNT_ID\` are not set."
              echo "Add both as repository secrets to enable the API deploy — see KLA-9"
              echo "and \`docs/decisions/0002-hosting.md\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=API deploy skipped::Cloudflare secrets not configured (KLA-9)"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.creds.outputs.ready == 'true'
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.ready == 'true'
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.creds.outputs.ready == 'true'

      # Stamp the real commit over the wrangler.toml placeholders so /health can
      # prove which build is live.
      - name: Deploy to Cloudflare Workers
        if: steps.creds.outputs.ready == 'true'
        id: deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          pnpm exec wrangler deploy \
            --var "GIT_COMMIT:$GIT_COMMIT" \
            --var "BUILD_TIME:$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --var "APP_ENV:production"

      # Proves the deployed Worker serves THIS commit. Same contract the web
      # deploy already holds itself to.
      - name: Smoke test deployed health endpoint
        if: steps.creds.outputs.ready == 'true'
        env:
          API_URL: ${{ vars.API_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ]; then
            echo "FAILED: repository variable API_URL is not set, so the deploy cannot be verified."
            echo "Set it to the deployed Worker URL (e.g. https://goodgrades-api.<subdomain>.workers.dev)."
            exit 1
          fi
          url="${API_URL%/}/health"
          for attempt in $(seq 1 10); do
            body="$(curl -fsS --max-time 15 "$url" || true)"
            got="$(printf '%s' "$body" | jq -r '.commit // empty')"
            if [ "$got" = "$EXPECTED_SHA" ]; then
              echo "OK: $url reports commit $got"
              exit 0
            fi
            echo "attempt $attempt: got '${got:-<none>}', want '$EXPECTED_SHA'; retrying..."
            sleep 10
          done
          echo "FAILED: $url never reported commit $EXPECTED_SHA"
          exit 1
